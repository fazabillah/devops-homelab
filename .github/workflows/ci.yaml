name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository_owner }}/homelab-python-app

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: pytest app/test_main.py -v

  build-and-push:
    name: Build, Scan, and Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write          # Needed to push the manifest update commit
      packages: write
      security-events: write   # For Trivy SARIF upload

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ env.SHORT_SHA }}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./app
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true

      # Step 1: Generate SARIF for Security tab (all severities, no exit gate)
      - name: Run Trivy scan (SARIF report)
        # Pin to v0.35.0, not @master — trivy-action@master was compromised March 2026.
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          trivyignores: ".trivyignore"
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

      # Step 2: Pipeline gate — fails on fixable CRITICAL/HIGH only
      - name: Run Trivy scan (pipeline gate)
        # Pin to v0.35.0, not @master — trivy-action@master was compromised March 2026.
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: ".trivyignore"

      - name: Push Docker image (scan passed)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        # Pin to v0.35.0, not @master — trivy-action@master was compromised March 2026.
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}
          format: "cyclonedx"
          output: "sbom.json"

      - name: Upload SBOM as artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Update image tag in Kustomize overlay
        if: github.event_name != 'pull_request'
        run: |
          SHA_TAG="sha-${{ env.SHORT_SHA }}"

          # Update the newTag field in the prod overlay's kustomization.yaml
          # ArgoCD watches this file and deploys when it changes
          sed -i "s|newTag:.*|newTag: ${SHA_TAG}|g" \
            kustomize/overlays/prod/kustomization.yaml

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add kustomize/overlays/prod/kustomization.yaml
          git commit -m "ci: update prod image tag to ${SHA_TAG}" || exit 0
          git push

  scan-manifests:
    name: Scan Kubernetes Manifests
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy misconfiguration scan
        # Pin to v0.35.0, not @master — trivy-action@master was compromised March 2026.
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-config-results.sarif"
          exit-code: "0"         # Informational only — findings go to Security tab

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-config-results.sarif') != ''
        with:
          sarif_file: "trivy-config-results.sarif"

  scan-secrets:
    name: Scan for Secrets in Code
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy secret scan
        # Pin to v0.35.0, not @master — trivy-action@master was compromised March 2026.
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "secret"
          format: "sarif"
          output: "trivy-secrets.sarif"
          exit-code: "1"         # Fail the pipeline if a secret is found

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-secrets.sarif') != ''
        with:
          sarif_file: "trivy-secrets.sarif"