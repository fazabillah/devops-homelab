name: Java CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'java-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'java-app/**'

env:
  IMAGE_NAME: ${{ github.repository_owner }}/java-screening-app

jobs:
  test:
    name: Maven Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw -B test
        working-directory: java-app

  build-and-push:
    name: Build, Scan, and Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write          # Needed to push the manifest update commit
      packages: write
      security-events: write   # For Trivy SARIF upload to GitHub Security tab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ env.SHORT_SHA }}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./java-app
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true

      - name: Run Trivy scan (SARIF report)
        # Pin to v0.35.0, not @master. trivy-action@master was compromised in March 2026 for ~12h.
        # Always pin to a versioned tag or full commit SHA for supply-chain safety.
        # exit-code: '0' — SARIF mode ignores severity filter for exit code, so we separate
        # report generation from the pipeline gate to avoid false failures.
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true

      - name: Run Trivy scan (pipeline gate)
        # Gates the pipeline on CRITICAL findings with available fixes only.
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Docker image (scan passed)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./java-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update image tag in Kustomize overlay
        if: github.event_name != 'pull_request'
        run: |
          SHA_TAG="sha-${{ env.SHORT_SHA }}"

          # Update the newTag field in the prod overlay's kustomization.yaml.
          # ArgoCD watches this file and deploys when it changes.
          sed -i "s|newTag:.*|newTag: ${SHA_TAG}|g" \
            java-kustomize/overlays/prod/kustomization.yaml

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add java-kustomize/overlays/prod/kustomization.yaml
          git commit -m "ci: update java-prod image tag to ${SHA_TAG}" || exit 0
          git push