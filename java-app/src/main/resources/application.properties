# Application identity — overridden by Kubernetes ConfigMap in lab3-automation/04
app.version=${APP_VERSION:unknown}
app.environment=${APP_ENVIRONMENT:development}

# Server
server.port=8080

# Actuator — expose health, info, and prometheus endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.health.db.enabled=false

# Database — values injected as environment variables by Kubernetes Secret/ConfigMap
# Fallback values let the app start locally without a database configured
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:system}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP connection pool — tuned conservatively for homelab
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# Logging — structured format makes log parsing easier in Splunk
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n