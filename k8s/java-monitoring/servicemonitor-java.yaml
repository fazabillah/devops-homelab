apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: java-screening-app
  namespace: monitoring
  labels:
    # This label must match the Prometheus Operator's serviceMonitorSelector.
    # The default kube-prometheus-stack uses: release: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - java-prod
  selector:
    matchLabels:
      app: java-screening-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s