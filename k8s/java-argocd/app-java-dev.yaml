apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-dev
  namespace: argocd
spec:
  project: java
  source:
    repoURL: https://github.com/fazabillah/devops-homelab.git
    targetRevision: HEAD
    path: java-kustomize/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: java-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true