apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-java
  namespace: monitoring
  labels:
    app: fluent-bit-java
spec:
  selector:
    matchLabels:
      app: fluent-bit-java
  template:
    metadata:
      labels:
        app: fluent-bit-java
    spec:
      serviceAccountName: fluent-bit-java
      tolerations:
        # Allow running on control plane nodes if tainted
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:4.0
          env:
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fluent-bit-splunk-hec
                  key: SPLUNK_HEC_TOKEN

          resources:
            requests:
              memory: "50Mi"
              cpu: "50m"
            limits:
              memory: "100Mi"
              cpu: "200m"

          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc

      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config
          configMap:
            name: fluent-bit-java-config