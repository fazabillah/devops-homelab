apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: prod-

namespace: app-prod

resources:
  - ../../base

patches:
  - path: patch-replicas.yaml

images:
  - name: docker.io/fazabillah/homelab-python-app
    newTag: sha-6987121

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info