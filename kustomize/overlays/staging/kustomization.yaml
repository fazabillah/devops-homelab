apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: staging-

namespace: app-staging

resources:
  - ../../base

patches:
  - path: patch-replicas.yaml

images:
  - name: docker.io/fazabillah/homelab-python-app
    newTag: sha-f2277da

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=info