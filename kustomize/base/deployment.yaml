apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-python-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homelab-python-app
  template:
    metadata:
      labels:
        app: homelab-python-app
    spec:
      containers:
      - name: app
        image: docker.io/fazabillah/homelab-python-app:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"