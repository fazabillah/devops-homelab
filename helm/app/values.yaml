replicaCount: 2

image:
  repository: docker.io/fazabillah/homelab-python-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"

env:
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "development"