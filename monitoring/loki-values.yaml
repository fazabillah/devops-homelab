deploymentMode: SingleBinary

loki:
  auth_enabled: false  # Single-tenant mode for homelab

  commonConfig:
    replication_factor: 1  # Single replica (no HA needed for homelab)

  storage:
    type: filesystem  # Store on disk, no object storage needed

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi

# Disabled — memcached chunks cache requires too much memory for homelab VMs
chunksCache:
  enabled: false

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

# Promtail collects logs from pods and ships them to Loki
promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
