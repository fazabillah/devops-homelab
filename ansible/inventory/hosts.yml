all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    kubeconfig_path: /home/fbi/.kube/config

  children:
    k3s_control:
      hosts:
        k3s-control:
          ansible_host: "{{ lookup('env', 'TAILSCALE_CONTROL_IP') }}"
          node_role: control

    k3s_workers:
      hosts:
        k3s-worker:
          ansible_host: "{{ lookup('env', 'TAILSCALE_WORKER_IP') }}"
          node_role: worker

    k3s_cluster:
      children:
        k3s_control:
        k3s_workers: